name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run lint

      - run: npx next build

      # 启动生产服务器进行冒烟测试
      - name: 启动本地服务器
        run: |
          npx next start &
          echo "PID=$!"
          # 等待服务器就绪（最多尝试 30 次，每次 2 秒）
          for i in $(seq 1 30); do
            if curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/en | grep -q 200; then
              echo "服务器就绪"
              break
            fi
            echo "等待服务器... ($i/30)"
            sleep 2
          done

      - name: 运行冒烟测试
        run: node scripts/smoke-test.mjs

      - name: 停止本地服务器
        if: always()
        run: kill $(lsof -t -i:3000) 2>/dev/null || true
